<svg width="580" height="50" viewBox="0 0 580 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="revealClip">
      <rect id="revealRect" x="0" y="0" width="0" height="50">
        <animate attributeName="width"
                 values="0;545;545;545;0;0"
                 keyTimes="0;0.35;0.55;0.6;0.95;1"
                 dur="6s"
                 repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <text x="10" y="33"
        font-family="'Fira Code', Consolas, monospace"
        font-size="26"
        font-weight="700"
        fill="#3B82F6"
        clip-path="url(#revealClip)">
    Welcome to Vrunda's GitHub Profile
  </text>

  <rect x="8" y="9" width="3" height="30" fill="#3B82F6">
    <animate attributeName="opacity"
             values="1;1;0;0;1"
             keyTimes="0;0.4;0.5;0.9;1"
             dur="1s"
             repeatCount="indefinite" />
    <animateTransform attributeName="transform"
             type="translate"
             values="0,0; 533,0; 533,0; 0,0; 0,0"
             keyTimes="0;0.35;0.6;0.95;1"
             dur="6s"
             repeatCount="indefinite" />
  </rect>
</svg>
